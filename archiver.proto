syntax = "proto3";

package provenance;

option go_package = "github.com/accretional/proto-prov/pb";

import "accretional/proto-resource/resource.proto";

message Snapshot {
  string uri = 1;
  Resource resource = 2;
  google.protobuf.Timestamp requested_at = 3;
  google.protobuf.Timestamp received_at = 4;
}

service Archiver {
  rpc Capture(resource.Resource) returns(Snapshot);
}
