syntax = "proto3";

package provenance;

option go_package = "github.com/accretional/proto-prov/pb";

import "accretional/proto-resource/resource.proto";
import "accretional/proto-domain/domain.proto";

message Subject {
  Resource resource = 1;
  string field_mask = 2;
}

message Change {
  Subject subject = 1;
  bytes content = 2;
}

message Challenge {
  string uri = 1;
  repeated Change changes = 2;
  google.protobuf.Timestamp requested_at = 3;
}

message Result {
  oneof kind {
    resource.Resource accepted = 1;
    Challenge next = 2;
    repeated string rejection_messages = 3;
  }
}

service Challenger {
  rpc Establish(domain.Domain) returns(Challenge);
  rpc Join(domain.Domain) returns(Challenge);
  rpc Show(Challenge) returns(Result);
}
